spring:
  application:
    name: config-server
  profiles:
    active: native
  discovery:
    enabled=true:
  cloud:
    config:
      server:
        native:
          searchLocations:
            - classpath:config/infra/{application}
            - classpath:config/core/{application}
            - classpath:config/stat/{application}

server:
  port: 0
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/